<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>いっしょにみよう！どうがプレイヤー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🎬 いっしょにみよう！</h1>
  <a href="howto.html" class="howto-link">❓ つかいかた</a>

  <section class="url-input-area">
    <div class="url-row">
      <div class="url-field">
        <label for="url1">🎥 どうが 1 の URL</label>
        <input type="text" id="url1" placeholder="https://www.youtube.com/watch?v=...">
      </div>
      <div class="url-field">
        <label for="url2">🎥 どうが 2 の URL</label>
        <input type="text" id="url2" placeholder="https://www.youtube.com/watch?v=...">
      </div>
    </div>
    <button id="btn-copy" class="btn btn-copy" disabled>🔗 このURLをシェア</button>
  </section>

  <section class="players-area">
    <div class="player-wrapper">
      <div class="player-frame">
        <div id="player1"></div>
      </div>
      <p id="error1" class="error-msg"></p>
      <div class="volume-control">
        <span>🔊</span>
        <input type="range" id="vol1" min="0" max="100" value="80">
      </div>
    </div>
    <div class="player-wrapper">
      <div class="player-frame">
        <div id="player2"></div>
      </div>
      <p id="error2" class="error-msg"></p>
      <div class="volume-control">
        <span>🔊</span>
        <input type="range" id="vol2" min="0" max="100" value="80">
      </div>
    </div>
  </section>

  <section class="controls-area">
    <div class="main-buttons">
      <button id="btn-play" class="btn btn-play">▶ さいせいスタート</button>
      <button id="btn-resync" class="btn btn-resync" disabled>🔄 CMがおわったらここを押して</button>
    </div>
    <div class="seek-area">
      <span id="current-time">0:00</span>
      <input type="range" id="seekbar" min="0" max="100" value="0" disabled>
      <span id="total-time">0:00</span>
    </div>
  </section>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="script.js"></script>
</body>
</html>
